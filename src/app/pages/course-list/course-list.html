<h2>Course List</h2>

<!-- Loading -->
<p *ngIf="isLoading">
    Loading courses...
</p>

<!-- Courses -->
<div *ngIf="!isLoading">

    <app-course-card
        *ngFor="let c of courses; trackBy: trackByCourseId"
        [course]="c"
        (enrollRequested)="onEnroll($event)">
    </app-course-card>

    <p *ngIf="selectedCourseId">
        Selected course ID: {{ selectedCourseId }}
    </p>

    <!-- No courses -->
    <p *ngIf="courses.length === 0">
        No courses available.
    </p>

</div>

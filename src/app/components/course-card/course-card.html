<div class="course-card" [ngClass]="cardClasses" [ngStyle]="borderStyle">
  <h3>{{ course.name }}</h3>
  <p>{{ course.code }}</p>
  <button (click)="enroll()">Enroll</button>
  <button (click)="toggleDetails()">Show Details</button>

  <div *ngIf="isExpanded">
    <p>Instructor: {{ course.instructor }}</p>
    <p>Credits: {{ course.credits }}</p>
    <p>Status: {{ course.gradeStatus }}</p>
  </div>
</div>
<hr>
